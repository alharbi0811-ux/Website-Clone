kind = "web"
previewPath = "/"
title = "Seen Jeem - سين جيم"
version = "1.0.0"
id = "artifacts/seenjeem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24947

[services.development]
run = "pnpm --filter @workspace/seenjeem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/seenjeem", "run", "build" ]
publicDir = "artifacts/seenjeem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24947"
BASE_PATH = "/"
